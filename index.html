<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Verification</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 18px; text-transform: uppercase; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        
        /* The Clown Screen */
        #clown {
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: black; color: white; z-index: 100;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .emoji { font-size: 120px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Enter Car Plate</h2>
        <input type="text" id="plate" placeholder="ABC 1234">
        <button id="nextBtn">Next Step</button>
    </div>

    <div id="clown">
        <div class="emoji">🤡</div>
        <h1 style="font-size: 50px;">GOTCHA!</h1>
        <p>Honk Honk!</p>
        <button onclick="location.reload()" style="width: auto; background: #444;">Back</button>
    </div>

    <script>
        // We use a different way to click to make it more reliable
        document.getElementById('nextBtn').addEventListener('click', function() {
            var val = document.getElementById('plate').value;
            if(val === "") {
                alert("Enter plate number first!");
            } else {
                document.getElementById('clown').style.display = 'flex';
            }
        });
    </script>

</body>
</html>
