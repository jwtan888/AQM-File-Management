<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Plate Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .card { background: white; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        /* The Clown Overlay */
        #clownOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .clown-emoji { font-size: 150px; animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="card p-8 w-full max-w-md">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Vehicle Verification</h1>
        <p class="text-slate-500 text-sm mb-6">Please enter your car plate number to proceed to the investment portal.</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider">Car Plate Number</label>
                <input type="text" id="carPlate" placeholder="ABC 1234" 
                    class="w-full mt-1 p-4 bg-slate-50 border border-slate-200 rounded-xl text-xl font-mono focus:ring-2 focus:ring-blue-500 outline-none uppercase">
            </div>
            
            <button onclick="showClown()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all active:scale-95">
                Next Step
            </button>
        </div>
    </div>

    <div id="clownOverlay">
        <div class="clown-emoji">🤡</div>
        <h2 class="text-white text-4xl font-black mt-8">HONK! HONK!</h2>
        <p class="text-white mt-4 opacity-75">Gotcha!</p>
        <button onclick="hideClown()" class="mt-10 text-slate-400 underline">Close</button>
    </div>

    <script>
        function showClown() {
            const plate = document.getElementById('carPlate').value;
            if (plate.trim() === "") {
                alert("Please enter a plate number first!");
                return;
            }
            
            // Show the clown overlay
            document.getElementById('clownOverlay').style.display = 'flex';
            
            // Optional: Play a sound (if you want to add an audio file later)
            // let audio = new Audio
